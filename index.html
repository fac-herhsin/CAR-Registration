<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何鑫實業 - 公務車管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        :root { --brand-yellow: #facc15; --brand-dark: #121212; --card-dark: #1e1e1e; --border-dark: #333333; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--brand-dark); color: #ffffff; }
        .card { background: var(--card-dark); border-radius: 16px; border: 1px solid var(--border-dark); }
        .btn-yellow { background-color: var(--brand-yellow); color: #000; font-weight: bold; }
        .status-badge { padding: 4px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: bold; }
        .status-pending { background: #423b00; color: #facc15; border: 1px solid #facc15; }
        .status-approved { background: #064e3b; color: #34d399; border: 1px solid #059669; }
        input, select, textarea { background: #2d2d2d !important; border: 1px solid #444 !important; color: white !important; border-radius: 8px; padding: 10px; width: 100%; margin-top: 4px; }
        .loader { border: 3px solid #333; border-top: 3px solid var(--brand-yellow); border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="loginPage" class="flex flex-col items-center justify-center min-h-screen p-4">
        <h1 class="text-3xl font-bold mb-8 text-yellow-400 text-center tracking-widest">公務車管理系統</h1>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="loginAs('staff')" class="w-full bg-gray-800 py-4 rounded-2xl border border-gray-700 hover:bg-gray-700 transition">廠務人員入口</button>
            <button onclick="loginAs('supervisor')" class="w-full bg-gray-800 py-4 rounded-2xl border border-gray-700 hover:bg-gray-700 transition">廠務主管入口</button>
            <button onclick="loginAs('admin')" class="w-full bg-yellow-400/10 text-yellow-400 py-4 rounded-2xl border border-yellow-400/30 hover:bg-yellow-400/20 transition">管理員入口</button>
        </div>
    </div>

    <div id="appPage" class="hidden p-4 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-xl font-bold text-yellow-400">何鑫實業 - 薪昌</h2>
                <p class="text-[10px] text-gray-500">當前權限：<span id="roleName" class="text-gray-300"></span></p>
            </div>
            <button onclick="location.reload()" class="bg-gray-800 px-4 py-2 rounded-lg text-xs border border-gray-700">登出</button>
        </div>

        <div id="kmDashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="card p-6 border-t-4 border-yellow-400 shadow-2xl">
                    <form id="regForm" class="space-y-4">
                        <h3 class="font-bold text-lg mb-2 text-white">出車登記</h3>
                        <div>
                            <label class="text-[10px] text-gray-400 ml-1">外出時間</label>
                            <input type="datetime-local" id="outTime" required>
                        </div>
                        <input type="text" id="driver" placeholder="駕駛姓名" required>
                        <select id="car" required><option value="">正在載入車輛...</option></select>
                        <select id="vendorSelect" onchange="handleVendorChange()"><option value="">-- 從地點資料庫選擇 (自動帶入里程) --</option></select>
                        <input type="number" id="kmInput" step="0.1" placeholder="本次行駛里程 (KM)" required>
                        <textarea id="purpose" placeholder="目的說明 (如:工地勘查)" rows="2" required></textarea>
                        <button type="submit" id="submitBtn" class="w-full btn-yellow py-3 rounded-xl mt-2">提交登記單</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="card overflow-hidden shadow-2xl">
                    <div class="p-4 bg-[#252525] flex justify-between items-center border-b border-gray-800">
                        <span class="font-bold text-sm text-yellow-400">公務車使用登記簿</span>
                        <div id="syncLoader" class="loader hidden"></div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full text-sm">
                            <thead class="bg-[#2a2a2a] text-yellow-400 text-[11px] uppercase tracking-wider">
                                <tr>
                                    <th class="p-4 text-left">時間資訊</th>
                                    <th class="p-4 text-left">車輛/里程/目的</th>
                                    <th class="p-4 text-left">狀態</th>
                                    <th class="p-4 text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody id="dataTable" class="divide-y divide-gray-800"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="editKmModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="card p-6 w-full max-w-sm border-t-4 border-yellow-500">
            <h3 class="font-bold text-lg mb-2 text-yellow-400">修改公里數</h3>
            <p class="text-xs text-gray-400 mb-4">修正此單據的行駛公里數：</p>
            <input type="number" id="newKmValue" step="0.1" class="mb-6 w-full" placeholder="輸入正確里程">
            <div class="flex gap-3">
                <button onclick="document.getElementById('editKmModal').classList.add('hidden')" class="flex-1 py-3 bg-gray-700 rounded-xl">取消</button>
                <button id="confirmEditKmBtn" class="flex-1 py-3 bg-yellow-500 text-black rounded-xl font-bold">確認修改</button>
            </div>
        </div>
    </div>

    <div id="returnModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="card p-6 w-full max-w-sm border-t-4 border-blue-500">
            <h3 class="font-bold text-lg mb-4 text-blue-400">登記返回時間</h3>
            <input type="datetime-local" id="modalReturnTime" class="mb-6">
            <div class="flex gap-3">
                <button onclick="document.getElementById('returnModal').classList.add('hidden')" class="flex-1 py-3 bg-gray-700 rounded-xl">取消</button>
                <button id="confirmReturnBtn" class="flex-1 py-3 bg-blue-600 rounded-xl font-bold">確認返回</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymtLzzdKt8lrW-6trqIPXiOaQmT5aUnppVAsRcUofs4rHaaW6QG0fbfX7gO-tYipa5YQ/exec"; 
        let currentRole = "staff", records = [], carTotals = {}, vendors = [];
        let currentEditingId = null;

        // 登入功能
        function loginAs(role) {
            currentRole = role;
            document.getElementById('roleName').innerText = { 'staff': '廠務人員', 'supervisor': '廠務主管', 'admin': '系統管理員' }[role];
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
            fetchData();
        }

        // 時間格式化工具：強制轉為 24 小時制 MM/DD HH:mm
        function formatDateTime(dateStr) {
            if (!dateStr || dateStr === '尚未返回') return dateStr;
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;

            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            
            return `${mm}/${dd} ${hh}:${min}`;
        }

        // 抓取後端資料
        async function fetchData() {
            document.getElementById('syncLoader').classList.remove('hidden');
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                records = data.records; 
                carTotals = data.totals; 
                vendors = data.vendors;
                updateDashboard(); 
                updateCarDropdown(); 
                updateVendorDropdown();
                renderTable();
            } catch(e) { console.error("資料讀取失敗:", e); }
            document.getElementById('syncLoader').classList.add('hidden');
        }

        // 更新上方車輛里程儀表板
        function updateDashboard() {
            const container = document.getElementById('kmDashboard');
            container.innerHTML = '';
            for (let car in carTotals) {
                const info = carTotals[car];
                const inspectDate = info.inspectDate ? info.inspectDate.split('T')[0] : '無數據';
                container.innerHTML += `
                    <div class="card p-4 border-l-4 border-yellow-400">
                        <div class="text-[10px] text-gray-500 mb-1">${car}</div>
                        <div class="text-2xl font-bold text-yellow-400">${Number(info.km).toLocaleString()} <span class="text-xs">km</span></div>
                        <div class="mt-2 text-[10px] text-gray-400 flex justify-between">
                            <span>下次保養: ${info.nextService}</span>
                            <span>定檢日期: ${inspectDate}</span>
                        </div>
                    </div>`;
            }
        }

        function updateCarDropdown() {
            const select = document.getElementById('car');
            select.innerHTML = '<option value="">-- 選擇車輛 --</option>';
            for (let car in carTotals) {
                select.innerHTML += `<option value="${car}">${car}</option>`;
            }
        }

        function updateVendorDropdown() {
            const select = document.getElementById('vendorSelect');
            select.innerHTML = '<option value="">-- 從地點資料庫選擇 (自動帶入里程) --</option>';
            vendors.forEach(v => {
                select.innerHTML += `<option value="${v.km}">${v.name} (${v.km}km)</option>`;
            });
        }

        function handleVendorChange() {
            const select = document.getElementById('vendorSelect');
            if (select.value) {
                document.getElementById('kmInput').value = select.value;
                document.getElementById('purpose').value = select.options[select.selectedIndex].text.split(' (')[0];
            }
        }

        // 渲染主要紀錄表格
        function renderTable() {
            const tbody = document.getElementById('dataTable');
            tbody.innerHTML = '';
            const isAdminOrBoss = currentRole === 'admin' || currentRole === 'supervisor';

            records.sort((a,b) => new Date(b.outTime) - new Date(a.outTime)).forEach(row => {
                const status = row.status || "待覆核";
                const displayOut = formatDateTime(row.outTime);
                const displayReturn = formatDateTime(row.returnTime || '尚未返回');

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-4 text-[11px] leading-relaxed">
                        <div class="font-medium text-white">${displayOut}</div>
                        <div class="text-gray-500">${displayReturn}</div>
                    </td>
                    <td class="p-4">
                        <div class="font-bold">${row.car} <span class="text-[10px] text-gray-400">(${row.driver})</span></div>
                        <div class="flex items-center gap-2">
                            <span class="text-blue-400 font-bold">${row.km} km</span>
                            ${isAdminOrBoss ? `<button onclick="openEditKmModal('${row.id}', ${row.km})" class="text-[10px] bg-gray-800 px-2 py-0.5 rounded text-yellow-500 border border-yellow-500/30">修改</button>` : ''}
                        </div>
                        <div class="text-[11px] text-gray-400 mt-1 line-clamp-1">目的：${row.purpose || ''}</div>
                    </td>
                    <td class="p-4"><span class="status-badge ${status === '已結案' ? 'status-approved' : 'status-pending'}">${status}</span></td>
                    <td class="p-4 text-center">
                        <div class="flex flex-col gap-2 items-center">
                            ${(isAdminOrBoss && status === '待覆核') ? `<button onclick="actionRecord('approve','${row.id}')" class="w-16 bg-yellow-400 text-black py-1.5 rounded text-[10px] font-bold">覆核</button>` : ''}
                            ${(currentRole !== 'supervisor' && status === '已出車') ? `<button onclick="openReturnModal('${row.id}')" class="w-16 bg-blue-600 py-1.5 rounded text-[10px] font-bold text-white">還車</button>` : ''}
                            ${currentRole === 'admin' ? `<button onclick="actionRecord('delete','${row.id}')" class="text-[10px] text-red-500 hover:underline">刪除</button>` : ''}
                        </div>
                    </td>`;
                tbody.appendChild(tr);
            });
        }

        // 修改里程
        function openEditKmModal(id, currentKm) {
            currentEditingId = id;
            document.getElementById('newKmValue').value = currentKm;
            document.getElementById('editKmModal').classList.remove('hidden');
        }

        document.getElementById('confirmEditKmBtn').onclick = async () => {
            const newKm = document.getElementById('newKmValue').value;
            if (!newKm) return;
            document.getElementById('editKmModal').classList.add('hidden');
            await postAction({ action: 'updateKm', id: currentEditingId, km: newKm });
        };

        // 還車登記
        function openReturnModal(id) {
            currentEditingId = id;
            document.getElementById('modalReturnTime').value = new Date().toISOString().slice(0, 16);
            document.getElementById('returnModal').classList.remove('hidden');
        }

        document.getElementById('confirmReturnBtn').onclick = async () => {
            const rTime = document.getElementById('modalReturnTime').value;
            document.getElementById('returnModal').classList.add('hidden');
            await postAction({ action: 'updateReturn', id: currentEditingId, returnTime: rTime });
        };

        // 提交登記單
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                action: 'append',
                id: Date.now(),
                outTime: document.getElementById('outTime').value,
                driver: document.getElementById('driver').value,
                car: document.getElementById('car').value,
                km: document.getElementById('kmInput').value,
                purpose: document.getElementById('purpose').value
            };
            await postAction(payload);
            e.target.reset();
            setNowTime();
        };

        async function actionRecord(action, id) {
            if (action === 'delete' && !confirm('確定要刪除這筆紀錄嗎？')) return;
            await postAction({ action, id });
        }

        async function postAction(payload) {
            document.getElementById('syncLoader').classList.remove('hidden');
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                await fetchData();
            } catch(e) { alert("連線失敗，請檢查網路或腳本設置"); }
            document.getElementById('syncLoader').classList.add('hidden');
        }

        function setNowTime() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('outTime').value = now.toISOString().slice(0, 16);
        }

        window.onload = setNowTime;
    </script>
</body>
</html>
