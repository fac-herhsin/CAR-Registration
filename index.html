<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何鑫實業 - 公務車管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        :root { --brand-yellow: #facc15; --brand-dark: #121212; --card-dark: #1e1e1e; --border-dark: #333333; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--brand-dark); color: #ffffff; }
        .card { background: var(--card-dark); border-radius: 16px; border: 1px solid var(--border-dark); }
        .btn-yellow { background-color: var(--brand-yellow); color: #000; font-weight: bold; }
        .status-badge { padding: 4px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: bold; }
        .status-pending { background: #423b00; color: #facc15; border: 1px solid #facc15; }
        .status-approved { background: #064e3b; color: #34d399; border: 1px solid #059669; }
        input, select, textarea { background: #2d2d2d !important; border: 1px solid #444 !important; color: white !important; border-radius: 8px; padding: 10px; width: 100%; margin-top: 4px; }
        .loader { border: 3px solid #333; border-top: 3px solid var(--brand-yellow); border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 目的說明的自動省略與展開效果 */
        .purpose-text {
            display: -webkit-box;
            -webkit-line-clamp: 1; /* 預設只顯示一行 */
            -webkit-box-orient: vertical;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: help;
        }

        /* 當滑鼠懸停在整格 td 或文字上時展開 */
        td:hover .purpose-text {
            -webkit-line-clamp: unset;
            color: #ffffff;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="loginPage" class="flex flex-col items-center justify-center min-h-screen p-4">
        <div class="w-20 h-20 bg-yellow-400 rounded-2xl flex items-center justify-center mb-6 shadow-xl">
             <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0zM13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1" />
            </svg>
        </div>
        <h1 class="text-3xl font-bold mb-8 text-yellow-400 text-center uppercase tracking-widest">公務車管理系統</h1>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="loginAs('staff')" class="w-full bg-gray-800 py-4 rounded-2xl border border-gray-700 hover:bg-gray-700 transition">廠務人員入口</button>
            <button onclick="loginAs('supervisor')" class="w-full bg-gray-800 py-4 rounded-2xl border border-gray-700 hover:bg-gray-700 transition">廠務主管入口</button>
            <button onclick="loginAs('admin')" class="w-full bg-yellow-400/10 text-yellow-400 py-4 rounded-2xl border border-yellow-400/30 hover:bg-yellow-400/20 transition">管理員入口</button>
        </div>
    </div>

    <div id="appPage" class="hidden p-4 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-xl font-bold text-yellow-400">何鑫實業 - 薪昌</h2>
                <p class="text-[10px] text-gray-500">當前權限：<span id="roleName" class="text-gray-300"></span></p>
            </div>
            <button onclick="location.reload()" class="bg-gray-800 px-4 py-2 rounded-lg text-xs border border-gray-700">登出</button>
        </div>

        <div id="kmDashboard" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="card p-6 border-t-4 border-yellow-400 shadow-2xl">
                    <form id="regForm" class="space-y-4">
                        <h3 class="font-bold text-lg mb-2 text-white">出車登記</h3>
                        <div>
                            <label class="text-[10px] text-gray-500 ml-1">外出時間</label>
                            <input type="datetime-local" id="outTime" required>
                        </div>
                        <input type="text" id="driver" placeholder="駕駛姓名" required>
                        <select id="car" required>
                            <option value="">選擇車輛</option>
                            <option value="ARC-9132(八人座)">ARC-9132(八人座)</option>
                            <option value="AQW-3898(卡旺)">AQW-3898(卡旺)</option>
                            <option value="BYV-6505(3.5T)">BYV-6505(3.5T)</option>
                        </select>
                        <select id="vendorSelect" onchange="handleVendorChange()">
                            <option value="">-- 從地點資料庫選擇 --</option>
                        </select>
                        <input type="number" id="kmInput" placeholder="來回里程 (KM)" required>
                        <textarea id="purpose" placeholder="目的說明 (如:工地勘查)" rows="2" required></textarea>
                        <button type="submit" id="submitBtn" class="w-full btn-yellow py-3 rounded-xl hover:scale-[1.02] transition">提交登記單</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="card overflow-hidden shadow-2xl">
                    <div class="p-4 bg-[#252525] flex justify-between items-center border-b border-gray-800">
                        <span class="font-bold text-sm text-yellow-400">公務車使用登記簿</span>
                        <div id="syncLoader" class="loader hidden"></div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full text-sm">
                            <thead class="bg-[#2a2a2a] text-yellow-400 text-[11px] uppercase tracking-wider">
                                <tr>
                                    <th class="p-4 text-left font-medium">時間資訊</th>
                                    <th class="p-4 text-left font-medium">車輛/里程/目的</th>
                                    <th class="p-4 text-left font-medium">狀態</th>
                                    <th class="p-4 text-center font-medium">操作</th>
                                </tr>
                            </thead>
                            <tbody id="dataTable" class="divide-y divide-gray-800"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="returnModal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="card p-6 w-full max-w-sm border-t-4 border-blue-500">
            <h3 class="font-bold text-lg mb-4 text-blue-400">登記返回時間</h3>
            <input type="datetime-local" id="modalReturnTime" class="mb-6">
            <div class="flex gap-3">
                <button onclick="document.getElementById('returnModal').classList.add('hidden')" class="flex-1 py-3 bg-gray-700 rounded-xl">取消</button>
                <button id="confirmReturnBtn" class="flex-1 py-3 bg-blue-600 rounded-xl font-bold">確認返回</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymtLzzdKt8lrW-6trqIPXiOaQmT5aUnppVAsRcUofs4rHaaW6QG0fbfX7gO-tYipa5YQ/exec";
        let currentRole = "staff";
        let records = [], vendors = [], carTotals = {};
        let currentEditingId = null;

        function loginAs(role) {
            currentRole = role;
            const roleMap = { 'staff': '廠務人員', 'supervisor': '廠務主管', 'admin': '系統管理員' };
            document.getElementById('roleName').innerText = roleMap[role];
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
            fetchData();
        }

        async function fetchData() {
            document.getElementById('syncLoader').classList.remove('hidden');
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                records = data.records;
                vendors = data.vendors;
                carTotals = data.totals;
                updateDashboard();
                updateVendorList();
                renderTable();
            } catch(e) { console.error(e); }
            document.getElementById('syncLoader').classList.add('hidden');
        }

        function updateDashboard() {
            const container = document.getElementById('kmDashboard');
            container.innerHTML = '';
            ["ARC-9132(八人座)", "AQW-3898(卡旺)", "BYV-6505(3.5T)"].forEach(car => {
                const info = carTotals[car] || { km: 0, nextService: "未設定", inspectDate: "未設定" };
                const isWarning = (parseFloat(info.nextService) - parseFloat(info.km)) < 500;
                
                container.innerHTML += `
                    <div class="card p-4 border-b-2 border-yellow-500 bg-gradient-to-br from-[#1e1e1e] to-[#121212]">
                        <div class="text-[10px] text-gray-500 uppercase font-bold tracking-tighter">${car}</div>
                        <div class="text-2xl font-bold ${isWarning ? 'text-red-500' : 'text-yellow-400'} my-1">
                            ${Number(info.km).toLocaleString()} <span class="text-xs text-gray-500">km</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 border-t border-gray-800 pt-2 text-[10px]">
                            <div class="text-gray-500">下回保養: <span class="text-gray-200">${info.nextService}</span></div>
                            <div class="text-gray-500">定期檢驗: <span class="text-gray-200">${info.inspectDate}</span></div>
                        </div>
                    </div>`;
            });
        }

        function updateVendorList() {
            const sel = document.getElementById('vendorSelect');
            sel.innerHTML = '<option value="">-- 從地點資料庫選擇 --</option>';
            vendors.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.km;
                opt.textContent = `${v.name} (來回 ${v.km * 2}km)`;
                sel.appendChild(opt);
            });
        }

        function handleVendorChange() {
            const sel = document.getElementById('vendorSelect');
            if (sel.value) {
                document.getElementById('kmInput').value = parseFloat(sel.value) * 2;
                document.getElementById('purpose').value = sel.options[sel.selectedIndex].text.split(' (')[0];
            }
        }

        function renderTable() {
            const tbody = document.getElementById('dataTable');
            tbody.innerHTML = '';
            records.sort((a,b) => new Date(b.outTime) - new Date(a.outTime)).forEach(row => {
                const status = row.status || "待覆核";
                const isAdmin = currentRole === 'admin';
                const isBoss = currentRole === 'supervisor' || isAdmin;
                const isStaff = currentRole === 'staff' || isAdmin;
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-4">
                        <div class="font-mono text-[11px] text-gray-300">${row.outTime.substring(5,16)}</div>
                        <div class="text-[10px] text-gray-500">${row.returnTime ? '回:'+row.returnTime.substring(5,16) : '尚未返回'}</div>
                    </td>
                    <td class="p-4 max-w-[220px]">
                        <div class="font-bold text-gray-100">${row.car.split('(')[0]} <span class="text-[10px] text-gray-500 ml-1">(${row.driver})</span></div>
                        <div class="text-blue-400 text-xs font-bold">${row.km} km</div>
                        <div class="text-[11px] text-gray-400 mt-1 italic font-light purpose-text" title="${row.purpose || ''}">
                            目的：${row.purpose || '未填寫'}
                        </div>
                    </td>
                    <td class="p-4"><span class="status-badge ${status.includes('已') ? 'status-approved' : 'status-pending'}">${status}</span></td>
                    <td class="p-4 text-center">
                        <div class="flex flex-col gap-1 items-center">
                            ${(isBoss && (status=='待覆核'||status=='待結案')) ? `<button onclick="actionRecord('approve','${row.id}')" class="w-16 bg-yellow-400 text-black px-2 py-1 rounded text-[10px] font-bold">覆核</button>` : ''}
                            ${(isStaff && status=='已出車') ? `<button onclick="openReturnModal('${row.id}')" class="w-16 bg-blue-600 px-2 py-1 rounded text-[10px] font-bold text-white">還車</button>` : ''}
                            ${isBoss ? `<button onclick="deleteRecord('${row.id}')" class="text-red-500 text-[9px] mt-1 hover:underline">刪除</button>` : ''}
                        </div>
                    </td>`;
                tbody.appendChild(tr);
            });
        }

        async function actionRecord(action, id, extra={}) {
            document.getElementById('syncLoader').classList.remove('hidden');
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action, id, ...extra }) });
            fetchData();
        }

        async function deleteRecord(id) {
            if(confirm("確定要刪除這筆紀錄嗎？此動作無法復原。")) {
                await actionRecord('delete', id);
            }
        }

        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "提交中...";
            await actionRecord('append', Date.now(), {
                outTime: document.getElementById('outTime').value.replace('T', ' '),
                driver: document.getElementById('driver').value,
                car: document.getElementById('car').value,
                purpose: document.getElementById('purpose').value,
                km: document.getElementById('kmInput').value
            });
            document.getElementById('regForm').reset();
            btn.disabled = false;
            btn.innerText = "提交登記單";
        };

        function openReturnModal(id) {
            currentEditingId = id;
            document.getElementById('modalReturnTime').value = new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000).toISOString().slice(0,16);
            document.getElementById('returnModal').classList.remove('hidden');
        }

        document.getElementById('confirmReturnBtn').onclick = async () => {
            const time = document.getElementById('modalReturnTime').value.replace('T', ' ');
            document.getElementById('returnModal').classList.add('hidden');
            await actionRecord('updateReturn', currentEditingId, { returnTime: time });
        };
    </script>
</body>
</html>
