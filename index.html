<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何鑫實業 - 公務車登記系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        :root { --brand-yellow: #facc15; --brand-dark: #121212; --card-dark: #1e1e1e; --border-dark: #333333; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--brand-dark); color: #ffffff; }
        .login-bg { background-color: #000000; }
        .app-bg { background-color: var(--brand-dark); }
        .card { background: var(--card-dark); border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); border: 1px solid var(--border-dark); }
        .btn-yellow { background-color: var(--brand-yellow); color: #000; transition: all 0.2s; }
        .btn-yellow:hover { background-color: #eab308; transform: translateY(-2px); }
        .btn-dark { background-color: #1a1a1a; color: white; border: 1px solid #333; transition: all 0.2s; }
        .status-badge { display: inline-flex; align-items: center; justify-content: center; padding: 6px 14px; border-radius: 9999px; font-size: 0.8rem; font-weight: bold; white-space: nowrap; min-width: 80px; text-align: center; line-height: 1; }
        .status-pending { background-color: #423b00; color: #facc15; border: 1px solid #facc15; }
        .status-approved { background-color: #064e3b; color: #34d399; border: 1px solid #059669; }
        input, select, textarea { background-color: #2d2d2d !important; border-color: #444 !important; color: white !important; width: 100%; border-radius: 8px; padding: 10px; outline: none; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--brand-yellow); border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .time-text { font-family: monospace; font-size: 0.85rem; color: #e5e7eb; }
    </style>
</head>
<body class="login-bg min-h-screen">

    <div id="loginPage" class="flex flex-col items-center justify-center min-h-screen p-4">
        <div class="w-24 h-24 bg-yellow-400 rounded-3xl flex items-center justify-center mb-6 shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0zM13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1" />
            </svg>
        </div>
        <h1 class="text-3xl font-bold mb-2">何鑫實業股份有限公司</h1>
        <p class="text-yellow-400 text-lg mb-12">公務車登記系統</p>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="loginAs('staff')" class="w-full btn-dark py-4 rounded-2xl">廠務人員入口</button>
            <button onclick="loginAs('supervisor')" class="w-full btn-dark py-4 rounded-2xl">廠務主管入口</button>
            <button onclick="loginAs('admin')" class="w-full btn-dark py-4 rounded-2xl">管理員控制台</button>
        </div>
    </div>

    <div id="appPage" class="hidden p-4 md:p-8">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-xl font-bold">何鑫實業 - 公務車管理</h1>
                    <p class="text-gray-400 text-sm">目前身份：<span id="displayRole" class="text-yellow-400 font-bold"></span></p>
                </div>
                <button onclick="logout()" class="px-4 py-2 border border-gray-700 rounded-xl bg-gray-800 text-sm">返回入口</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1">
                    <div class="card p-6 border-t-4 border-yellow-400">
                        <h2 class="text-lg font-bold mb-6 text-yellow-400">新增登記單</h2>
                        <form id="regForm" class="space-y-4">
                            <div>
                                <label class="block text-sm text-gray-300">預計外出時間</label>
                                <input type="datetime-local" id="outTime" required>
                            </div>
                            <div>
                                <label class="block text-sm text-gray-300">駕駛人員</label>
                                <input type="text" id="driver" placeholder="請輸入姓名" required>
                            </div>
                            <div>
                                <label class="block text-sm text-gray-300">使用車輛</label>
                                <select id="car" required>
                                    <option value="">請選擇車輛</option>
                                    <option value="ARC-9132(八人座)">ARC-9132(八人座)</option>
                                    <option value="AQW-3898(卡旺)">AQW-3898(卡旺)</option>
                                    <option value="BYV-6505(3.5T)">BYV-6505(3.5T)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm text-gray-300">使用目的 / 目的地</label>
                                <textarea id="purpose" rows="3" placeholder="例如：工地勘查、材料運送..." required></textarea>
                            </div>
                            <button type="submit" id="submitBtn" class="w-full btn-yellow py-3 font-bold rounded-xl mt-2">提交登記單</button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <div class="card overflow-hidden border-t-4 border-yellow-400">
                        <div class="p-5 flex justify-between items-center bg-[#252525]">
                            <h2 class="font-bold text-yellow-400">公務車使用紀錄</h2>
                            <div class="flex items-center gap-2">
                                <span id="syncStatus" class="text-xs text-gray-500">同步中...</span>
                                <div id="syncLoader" class="loader hidden"></div>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="min-w-full">
                                <thead class="bg-[#2a2a2a] text-xs text-yellow-400 uppercase">
                                    <tr>
                                        <th class="px-5 py-4 text-left">外出時間</th>
                                        <th class="px-5 py-4 text-left">返回時間</th>
                                        <th class="px-5 py-4 text-left">駕駛/車輛</th>
                                        <th class="px-5 py-4 text-left">目的</th>
                                        <th class="px-5 py-4 text-left">狀態</th>
                                        <th class="px-5 py-4 text-center">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="dataTable" class="divide-y divide-gray-800 text-sm"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="returnModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center z-[100] p-4">
        <div class="card w-full max-w-sm border-t-4 border-blue-500 p-6">
            <h3 class="text-xl font-bold text-white mb-2">還車登記</h3>
            <p class="text-gray-400 text-sm mb-6">請選擇實際返回廠區的時間：</p>
            <input type="datetime-local" id="modalReturnTime" class="mb-6 block w-full">
            <div class="flex gap-3">
                <button onclick="closeReturnModal()" class="flex-1 btn-dark py-3 rounded-xl text-sm">取消</button>
                <button id="confirmReturnBtn" class="flex-1 bg-blue-500 text-white font-bold py-3 rounded-xl hover:bg-blue-600 text-sm">確認送出</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 right-8 transform translate-y-24 opacity-0 transition-all duration-300 bg-yellow-400 text-black px-6 py-3 rounded-2xl z-50 font-bold">
        <span id="toastMsg">訊息提示</span>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxkZcwxPl4qMAHzx74jbnQDsabA1mxIjiy6my74jYYPE9XrHV__G52csR5RwnY_Hn_X/exec"; // 記得更換
        let currentRole = "staff";
        let records = [];
        let currentEditingId = null;

        function loginAs(role) {
            currentRole = role;
            document.getElementById('displayRole').innerText = role === 'staff' ? '廠務人員' : (role === 'supervisor' ? '廠務主管' : '管理員');
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
            document.body.classList.replace('login-bg', 'app-bg');
            fetchData();
        }

        function logout() { location.reload(); }

        async function fetchData() {
            document.getElementById('syncLoader').classList.remove('hidden');
            document.getElementById('syncStatus').innerText = "雲端同步中...";
            try {
                const response = await fetch(SCRIPT_URL);
                records = await response.json();
                renderTable();
                document.getElementById('syncStatus').innerText = "資料已同步";
            } catch (e) {
                document.getElementById('syncStatus').innerText = "同步失敗";
            } finally {
                document.getElementById('syncLoader').classList.add('hidden');
            }
        }

        function renderTable() {
            const tbody = document.getElementById('dataTable');
            tbody.innerHTML = '';
            
            const formatTime = (timeStr) => {
                if (!timeStr || timeStr === '尚未返回') return '--';
                const d = new Date(timeStr);
                if (isNaN(d.getTime())) return timeStr.replace('T', ' ').substring(0, 16);
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const hh = String(d.getHours()).padStart(2, '0');
                const mm = String(d.getMinutes()).padStart(2, '0');
                return `${y}-${m}-${day} ${hh}:${mm}`;
            };

            records.sort((a, b) => new Date(b.outTime) - new Date(a.outTime)).forEach(row => {
                const tr = document.createElement('tr');
                const isStaff = currentRole === 'staff' || currentRole === 'admin';
                const isBoss = currentRole === 'supervisor' || currentRole === 'admin';
                
                let statusText = String(row.status || "").trim();
                if (!statusText || statusText === "false") statusText = "待覆核";

                let statusClass = "status-pending";
                if (statusText === '已出車' || statusText === '已結案') statusClass = "status-approved";

                // 修改後的按鈕顯示邏輯
                const canApprove = isBoss && (statusText === '待覆核' || statusText === '待結案');
                const canMarkArrived = isStaff && statusText === '已出車';

                tr.innerHTML = `
                    <td class="px-5 py-5 time-text">${formatTime(row.outTime)}</td>
                    <td class="px-5 py-5 time-text text-gray-500">${row.returnTime ? formatTime(row.returnTime) : '尚未返回'}</td>
                    <td class="px-5 py-5">
                        <div class="text-white">${row.driver}</div>
                        <div class="text-xs text-yellow-500">${row.car}</div>
                    </td>
                    <td class="px-5 py-5">
                        <div class="max-w-[120px] truncate cursor-pointer hover:text-yellow-400 underline decoration-dotted" onclick="alert('目的地：\\n${row.purpose}')">
                            ${row.purpose}
                        </div>
                    </td>
                    <td class="px-5 py-5">
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </td>
                    <td class="px-5 py-5 text-center space-x-1">
                        ${canApprove ? `<button onclick="approveRecord('${row.id}')" class="bg-yellow-400 text-black px-3 py-1 rounded-lg font-bold text-xs">覆核</button>` : ''}
                        ${canMarkArrived ? `<button onclick="markArrived('${row.id}')" class="bg-blue-500 text-white px-3 py-1 rounded-lg font-bold text-xs">已抵達</button>` : ''}
                        ${isBoss ? `<button onclick="deleteRecord('${row.id}')" class="text-red-400 text-[10px] block mt-2 mx-auto">刪除</button>` : ''}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function callBackend(data) {
            document.getElementById('syncLoader').classList.remove('hidden');
            try {
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                const resJson = await response.json();
                if (resJson.result === "success") {
                    await fetchData();
                    return { success: true };
                } else {
                    console.error("後端錯誤:", resJson);
                    return { success: false };
                }
            } catch (e) {
                showToast("連線異常");
                return { success: false };
            } finally {
                document.getElementById('syncLoader').classList.add('hidden');
            }
        }

        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            const data = {
                action: 'append',
                id: Date.now().toString(),
                outTime: document.getElementById('outTime').value.replace('T', ' '),
                driver: document.getElementById('driver').value,
                car: document.getElementById('car').value,
                purpose: document.getElementById('purpose').value
            };
            const res = await callBackend(data);
            if(res.success) {
                document.getElementById('regForm').reset();
                showToast("提交成功，請主管覆核");
            }
            btn.disabled = false;
        };

        async function approveRecord(id) {
            const res = await callBackend({ action: 'approve', id: id });
            if(res.success) showToast("覆核完成");
        }

        function markArrived(id) {
            currentEditingId = id;
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('modalReturnTime').value = now.toISOString().slice(0, 16);
            document.getElementById('returnModal').classList.remove('hidden');
        }

        function closeReturnModal() {
            document.getElementById('returnModal').classList.add('hidden');
            currentEditingId = null;
        }

        document.getElementById('confirmReturnBtn').onclick = async () => {
            const timeValue = document.getElementById('modalReturnTime').value;
            if (!timeValue || !currentEditingId) return;
            closeReturnModal();
            const res = await callBackend({ 
                action: 'updateReturn', 
                id: currentEditingId, 
                returnTime: timeValue.replace('T', ' ') 
            });
            if(res.success) showToast("返回登記成功");
        };

        async function deleteRecord(id) {
            if(confirm("確定刪除此紀錄？")) {
                const res = await callBackend({ action: 'delete', id: id });
                if(res.success) showToast("紀錄已刪除");
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.classList.remove('translate-y-24', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-24', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>
