<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何鑫實業 - 公務車里程管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        :root { --brand-yellow: #facc15; --brand-dark: #121212; --card-dark: #1e1e1e; --border-dark: #333333; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--brand-dark); color: #ffffff; }
        .card { background: var(--card-dark); border-radius: 16px; border: 1px solid var(--border-dark); }
        .btn-yellow { background-color: var(--brand-yellow); color: #000; font-weight: bold; }
        .status-badge { padding: 4px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: bold; }
        .status-pending { background: #423b00; color: #facc15; border: 1px solid #facc15; }
        .status-approved { background: #064e3b; color: #34d399; border: 1px solid #059669; }
        input, select, textarea { background: #2d2d2d !important; border: 1px solid #444 !important; color: white !important; border-radius: 8px; padding: 10px; width: 100%; margin-top: 4px; }
        .loader { border: 3px solid #333; border-top: 3px solid var(--brand-yellow); border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="loginPage" class="flex flex-col items-center justify-center min-h-screen p-4">
        <h1 class="text-3xl font-bold mb-8 text-yellow-400 text-center">何鑫實業公務車管理</h1>
        <div class="w-full max-w-xs space-y-4">
            <button onclick="loginAs('staff')" class="w-full bg-gray-800 py-4 rounded-2xl border border-gray-700">廠務人員入口</button>
            <button onclick="loginAs('supervisor')" class="w-full bg-gray-800 py-4 rounded-2xl border border-gray-700">廠務主管入口</button>
        </div>
    </div>

    <div id="appPage" class="hidden p-4 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-yellow-400">系統主面板 (<span id="roleName"></span>)</h2>
            <button onclick="location.reload()" class="text-xs text-gray-500 underline">登出</button>
        </div>

        <div id="kmDashboard" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="card p-6 border-t-4 border-yellow-400">
                    <form id="regForm" class="space-y-4">
                        <h3 class="font-bold mb-2">出車登記</h3>
                        <input type="datetime-local" id="outTime" required>
                        <input type="text" id="driver" placeholder="駕駛姓名" required>
                        <select id="car" required>
                            <option value="">選擇車輛</option>
                            <option value="ARC-9132(八人座)">ARC-9132(八人座)</option>
                            <option value="AQW-3898(卡旺)">AQW-3898(卡旺)</option>
                            <option value="BYV-6505(3.5T)">BYV-6505(3.5T)</option>
                        </select>
                        <select id="vendorSelect" onchange="handleVendorChange()">
                            <option value="">-- 目的地資料庫 --</option>
                        </select>
                        <input type="number" id="kmInput" placeholder="來回里程 (KM)" required>
                        <textarea id="purpose" placeholder="目的說明" rows="2" required></textarea>
                        <button type="submit" id="submitBtn" class="w-full btn-yellow py-3 rounded-xl">提交登記單</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="card overflow-hidden">
                    <div class="p-4 bg-[#252525] flex justify-between items-center">
                        <span class="font-bold">近期紀錄</span>
                        <div id="syncLoader" class="loader hidden"></div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full text-sm">
                            <thead class="bg-[#2a2a2a] text-yellow-400">
                                <tr>
                                    <th class="p-3 text-left">時間</th>
                                    <th class="p-3 text-left">車輛/里程</th>
                                    <th class="p-3 text-left">狀態</th>
                                    <th class="p-3 text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody id="dataTable" class="divide-y divide-gray-800"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="returnModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-50">
        <div class="card p-6 w-full max-w-sm">
            <h3 class="font-bold mb-4">登記返回時間</h3>
            <input type="datetime-local" id="modalReturnTime" class="mb-4">
            <div class="flex gap-2">
                <button onclick="document.getElementById('returnModal').classList.add('hidden')" class="flex-1 py-2 bg-gray-700 rounded-lg">取消</button>
                <button id="confirmReturnBtn" class="flex-1 py-2 bg-blue-600 rounded-lg">確認返回</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymtLzzdKt8lrW-6trqIPXiOaQmT5aUnppVAsRcUofs4rHaaW6QG0fbfX7gO-tYipa5YQ/exec";
        let currentRole = "staff";
        let records = [], vendors = [], carTotals = {};
        let currentEditingId = null;

        function loginAs(role) {
            currentRole = role;
            document.getElementById('roleName').innerText = role === 'staff' ? '廠務' : '主管';
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
            fetchData();
        }

        async function fetchData() {
            document.getElementById('syncLoader').classList.remove('hidden');
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                records = data.records;
                vendors = data.vendors;
                carTotals = data.totals;
                updateDashboard();
                updateVendorList();
                renderTable();
            } catch(e) { alert("讀取失敗"); }
            document.getElementById('syncLoader').classList.add('hidden');
        }

        function updateDashboard() {
            const container = document.getElementById('kmDashboard');
            container.innerHTML = '';
            ["ARC-9132(八人座)", "AQW-3898(卡旺)", "BYV-6505(3.5T)"].forEach(car => {
                const info = carTotals[car] || { km: 0, nextService: "未設定", inspectDate: "未設定" };
                const isWarning = (parseFloat(info.nextService) - parseFloat(info.km)) < 500;
                
                container.innerHTML += `
                    <div class="card p-4 border-b-2 border-yellow-500">
                        <div class="text-[10px] text-gray-500 uppercase">${car}</div>
                        <div class="text-2xl font-bold ${isWarning ? 'text-red-500' : 'text-yellow-400'} mb-2">
                            ${Number(info.km).toLocaleString()} <span class="text-xs text-gray-400">km</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 border-t border-gray-800 pt-2 text-[11px]">
                            <div class="text-gray-500">下次保養: <span class="text-gray-200">${info.nextService}</span></div>
                            <div class="text-gray-500">定檢日期: <span class="text-gray-200">${info.inspectDate}</span></div>
                        </div>
                    </div>`;
            });
        }

        function updateVendorList() {
            const sel = document.getElementById('vendorSelect');
            sel.innerHTML = '<option value="">-- 目的地資料庫 --</option>';
            vendors.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.km;
                opt.textContent = `${v.name} (${v.km * 2}km)`;
                sel.appendChild(opt);
            });
        }

        function handleVendorChange() {
            const sel = document.getElementById('vendorSelect');
            if (sel.value) {
                document.getElementById('kmInput').value = parseFloat(sel.value) * 2;
                document.getElementById('purpose').value = sel.options[sel.selectedIndex].text.split(' (')[0];
            }
        }

        function renderTable() {
            const tbody = document.getElementById('dataTable');
            tbody.innerHTML = '';
            records.sort((a,b) => new Date(b.outTime) - new Date(a.outTime)).forEach(row => {
                const status = row.status || "待覆核";
                const isBoss = currentRole === 'supervisor';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-3">
                        <div class="font-mono text-[11px]">${row.outTime.substring(5,16)}</div>
                        <div class="text-[10px] text-gray-500">${row.returnTime ? '回:'+row.returnTime.substring(5,16) : '尚未返回'}</div>
                    </td>
                    <td class="p-3">
                        <div class="font-bold">${row.car.split('(')[0]}</div>
                        <div class="text-blue-400 text-xs">${row.km} km</div>
                    </td>
                    <td class="p-3"><span class="status-badge ${status.includes('已') ? 'status-approved' : 'status-pending'}">${status}</span></td>
                    <td class="p-3 text-center">
                        ${(isBoss && (status=='待覆核'||status=='待結案')) ? `<button onclick="actionRecord('approve','${row.id}')" class="bg-yellow-400 text-black px-2 py-1 rounded text-xs">覆核</button>` : ''}
                        ${(currentRole=='staff' && status=='已出車') ? `<button onclick="openReturnModal('${row.id}')" class="bg-blue-600 px-2 py-1 rounded text-xs">還車</button>` : ''}
                    </td>`;
                tbody.appendChild(tr);
            });
        }

        async function actionRecord(action, id, extra={}) {
            document.getElementById('syncLoader').classList.remove('hidden');
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action, id, ...extra }) });
            fetchData();
        }

        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            await actionRecord('append', Date.now(), {
                outTime: document.getElementById('outTime').value.replace('T', ' '),
                driver: document.getElementById('driver').value,
                car: document.getElementById('car').value,
                purpose: document.getElementById('purpose').value,
                km: document.getElementById('kmInput').value
            });
            document.getElementById('regForm').reset();
            btn.disabled = false;
        };

        function openReturnModal(id) {
            currentEditingId = id;
            document.getElementById('modalReturnTime').value = new Date(new Date().getTime() - new Date().getTimezoneOffset() * 60000).toISOString().slice(0,16);
            document.getElementById('returnModal').classList.remove('hidden');
        }

        document.getElementById('confirmReturnBtn').onclick = async () => {
            const time = document.getElementById('modalReturnTime').value.replace('T', ' ');
            document.getElementById('returnModal').classList.add('hidden');
            await actionRecord('updateReturn', currentEditingId, { returnTime: time });
        };
    </script>
</body>
</html>
